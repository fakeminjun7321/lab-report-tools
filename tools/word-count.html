<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>글자수 세기 — 보고서 도구</title>
    <meta name="description" content="공백 포함/미포함 글자수, 단어수, 줄수, 바이트를 실시간으로 세는 브라우저 도구." />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="landing">
    <div class="landing-bg" aria-hidden="true"></div>
    <nav class="landing-nav">
      <div class="landing-nav-inner">
        <a href="https://chem-pre-lab-web.onrender.com/" class="brand"><span class="brand-mark" aria-hidden="true">Q</span> Quilo</a>
        <div class="landing-nav-actions">
          <a href="../index.html" class="nav-link">← 도구 모음</a>
          <button type="button" id="themeToggle" class="theme-toggle" aria-label="다크 모드로 전환" title="다크 모드로 전환">
            <span class="theme-icon-light" aria-hidden="true">🌙</span>
            <span class="theme-icon-dark" aria-hidden="true">☀️</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="landing-shell">
      <section class="section" style="border-top:0">
        <div class="tool-page-head">
          <h1>글자수 세기</h1>
          <p>보고서 분량 제한을 맞출 때 쓰세요. 공백 포함/미포함 글자수, 단어수, 줄수, 바이트를 실시간으로 셉니다. 입력은 서버로 전송되지 않습니다.</p>
        </div>

        <div class="tool-card">
          <textarea id="wcInput" class="tool-input" placeholder="여기에 텍스트를 붙여넣으세요…" autofocus></textarea>
          <div class="tool-result" style="border-top:0;padding-top:0">
            <div class="stat-grid">
              <div class="stat-box"><div class="stat-label">글자수 (공백 포함)</div><div class="stat-value" id="wcChars">0</div></div>
              <div class="stat-box"><div class="stat-label">글자수 (공백 제외)</div><div class="stat-value" id="wcNoSpace">0</div></div>
              <div class="stat-box"><div class="stat-label">단어수</div><div class="stat-value" id="wcWords">0</div></div>
              <div class="stat-box"><div class="stat-label">줄수</div><div class="stat-value" id="wcLines">0</div></div>
              <div class="stat-box"><div class="stat-label">바이트 (UTF-8)</div><div class="stat-value" id="wcBytes">0</div></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="https://chem-pre-lab-web.onrender.com/">메인</a>
        <a href="../index.html">도구 모음</a>
        <a href="https://chem-pre-lab-web.onrender.com/guide.html">이용 가이드</a>
        <a href="https://blog.naver.com/physicjun1905" target="_blank" rel="noopener">블로그</a>
      </div>
      <div class="footer-copy">© 2026 Quilo · MIT License</div>
    </footer>

    <script src="../theme.js"></script>
    <script>
      (function () {
        var ta = document.getElementById("wcInput");
        var enc = window.TextEncoder ? new TextEncoder() : null;
        function fmt(n) { return n.toLocaleString("ko-KR"); }
        function set(id, n) { document.getElementById(id).textContent = fmt(n); }
        function update() {
          var t = ta.value;
          set("wcChars", Array.from(t).length);
          set("wcNoSpace", Array.from(t.replace(/\s/g, "")).length);
          set("wcWords", (t.trim().match(/\S+/g) || []).length);
          set("wcLines", t ? t.split(/\r\n|\r|\n/).length : 0);
          set("wcBytes", enc ? enc.encode(t).length : unescape(encodeURIComponent(t)).length);
        }
        ta.addEventListener("input", update);
        update();
      })();
    </script>
  </body>
</html>
