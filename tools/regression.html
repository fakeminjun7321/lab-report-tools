<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>선형회귀·추세선 — 보고서 도구</title>
    <meta name="description" content="(x, y) 데이터로 기울기·절편·R²을 구하고 추세선 그래프를 그려 PNG로 내려받는 브라우저 도구." />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="landing">
    <div class="landing-bg" aria-hidden="true"></div>
    <nav class="landing-nav">
      <div class="landing-nav-inner">
        <a href="https://chem-pre-lab-web.onrender.com/" class="brand"><span class="brand-mark" aria-hidden="true">R</span> 보고서 작성 툴</a>
        <div class="landing-nav-actions">
          <a href="../index.html" class="nav-link">← 도구 모음</a>
          <button type="button" id="themeToggle" class="theme-toggle" aria-label="다크 모드로 전환" title="다크 모드로 전환">
            <span class="theme-icon-light" aria-hidden="true">🌙</span>
            <span class="theme-icon-dark" aria-hidden="true">☀️</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="landing-shell">
      <section class="section" style="border-top:0">
        <div class="tool-page-head">
          <h1>선형회귀·추세선</h1>
          <p>(x, y) 측정값을 붙여넣으면 최소제곱 직선의 기울기·절편·결정계수(R²)를 구하고 추세선 그래프를 그립니다. 그래프는 흰 배경 PNG로 받아 보고서에 바로 넣을 수 있습니다.</p>
        </div>

        <div class="tool-card">
          <label class="tool-label"><span>데이터 (한 줄에 <b>x y</b> 또는 <b>x, y</b>) — 또는 아래에서 엑셀 업로드</span>
            <textarea id="rgIn" class="tool-input" placeholder="예:&#10;1  2.1&#10;2  3.9&#10;3  6.2&#10;4  7.8&#10;5  10.1"></textarea>
          </label>
          <details>
            <summary style="cursor:pointer;color:var(--accent-text);font-weight:650;font-size:14px">📊 엑셀/CSV 파일에서 가져오기</summary>
            <div id="rgFile" style="margin-top:12px"></div>
          </details>
          <div class="tool-row">
            <label class="tool-label">그래프 제목<input id="rgTitle" class="tool-input" placeholder="예: 변위-시간 그래프" /></label>
            <label class="tool-label">X축 이름<input id="rgX" class="tool-input" placeholder="예: 시간 (s)" /></label>
            <label class="tool-label">Y축 이름<input id="rgY" class="tool-input" placeholder="예: 변위 (m)" /></label>
          </div>

          <div id="rgOut" class="tool-result" style="display:none">
            <div class="stat-grid">
              <div class="stat-box"><div class="stat-label">기울기 (a)</div><div class="stat-value" id="rgSlope">–</div></div>
              <div class="stat-box"><div class="stat-label">y절편 (b)</div><div class="stat-value" id="rgInt">–</div></div>
              <div class="stat-box"><div class="stat-label">결정계수 R²</div><div class="stat-value" id="rgR2">–</div></div>
              <div class="stat-box"><div class="stat-label">데이터 수 (n)</div><div class="stat-value sm" id="rgN">–</div></div>
            </div>
            <p class="tool-out-code" id="rgEq" style="margin:0">y = a·x + b</p>
            <div style="background:#fff;border-radius:10px;padding:10px;border:1px solid var(--border)">
              <canvas id="rgChart" height="280"></canvas>
            </div>
            <button class="btn-lg btn-primary" id="rgDl" style="min-height:42px;padding:9px 18px;font-size:14px;justify-self:start">↓ 그래프 PNG 다운로드</button>
          </div>
          <p class="hint" id="rgMsg" style="margin:0"></p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-links">
        <a href="https://chem-pre-lab-web.onrender.com/">메인</a>
        <a href="../index.html">도구 모음</a>
        <a href="https://chem-pre-lab-web.onrender.com/guide.html">이용 가이드</a>
        <a href="https://blog.naver.com/physicjun1905" target="_blank" rel="noopener">블로그</a>
      </div>
      <div class="footer-copy">© 2026 Lab Report Generator Web · MIT License · 그래프: Chart.js (MIT)</div>
    </footer>

    <script src="vendor/chart.umd.min.js"></script>
    <script src="data-input.js"></script>
    <script src="../theme.js"></script>
    <script>
      (function () {
        var inp = document.getElementById("rgIn"), out = document.getElementById("rgOut"), msg = document.getElementById("rgMsg");
        var chart = null;
        var whiteBg = { id: "whiteBg", beforeDraw: function (c) { var x = c.ctx; x.save(); x.globalCompositeOperation = "destination-over"; x.fillStyle = "#ffffff"; x.fillRect(0, 0, c.width, c.height); x.restore(); } };

        function num(v) {
          if (!isFinite(v)) return "–";
          var a = Math.abs(v);
          if (a !== 0 && (a < 1e-4 || a >= 1e7)) return v.toExponential(4);
          return Number(v.toPrecision(6)).toLocaleString("ko-KR", { maximumFractionDigits: 6 });
        }
        function parse(s) {
          var pts = [];
          s.split(/\r?\n/).forEach(function (line) {
            var m = line.match(/-?\d*\.?\d+(?:[eE][-+]?\d+)?/g);
            if (m && m.length >= 2) { var x = +m[0], y = +m[1]; if (isFinite(x) && isFinite(y)) pts.push({ x: x, y: y }); }
          });
          return pts;
        }
        var lastPts = [];
        function render(pts) {
          lastPts = pts;
          var n = pts.length;
          if (n < 2) { out.style.display = "none"; msg.textContent = n === 0 ? "" : "점이 2개 이상 있어야 추세선을 구합니다."; return; }
          msg.textContent = "";
          var sx = 0, sy = 0; pts.forEach(function (p) { sx += p.x; sy += p.y; });
          var mx = sx / n, my = sy / n, sxx = 0, sxy = 0, syy = 0;
          pts.forEach(function (p) { sxx += (p.x - mx) * (p.x - mx); sxy += (p.x - mx) * (p.y - my); syy += (p.y - my) * (p.y - my); });
          var slope = sxx ? sxy / sxx : NaN, inter = my - slope * mx;
          var r2 = (sxx && syy) ? (sxy * sxy) / (sxx * syy) : NaN;
          out.style.display = "grid";
          document.getElementById("rgSlope").textContent = num(slope);
          document.getElementById("rgInt").textContent = num(inter);
          document.getElementById("rgR2").textContent = num(r2);
          document.getElementById("rgN").textContent = n;
          document.getElementById("rgEq").textContent = "y = " + num(slope) + " x " + (inter >= 0 ? "+ " : "− ") + num(Math.abs(inter)) + "   (R² = " + num(r2) + ")";

          var xs = pts.map(function (p) { return p.x; }), minX = Math.min.apply(null, xs), maxX = Math.max.apply(null, xs);
          var line = isFinite(slope) ? [{ x: minX, y: slope * minX + inter }, { x: maxX, y: slope * maxX + inter }] : [];
          var title = document.getElementById("rgTitle").value, xl = document.getElementById("rgX").value, yl = document.getElementById("rgY").value;
          var data = {
            datasets: [
              { label: "측정값", data: pts, backgroundColor: "#2f6df6", pointRadius: 4 },
              { label: "추세선", type: "line", data: line, borderColor: "#e0457b", borderWidth: 2, pointRadius: 0, fill: false }
            ]
          };
          var opts = {
            responsive: true, animation: false, color: "#333",
            plugins: { legend: { labels: { color: "#333" } }, title: { display: !!title, text: title, color: "#222", font: { size: 15 } } },
            scales: {
              x: { type: "linear", title: { display: !!xl, text: xl, color: "#333" }, ticks: { color: "#444" }, grid: { color: "#e3e6ea" } },
              y: { title: { display: !!yl, text: yl, color: "#333" }, ticks: { color: "#444" }, grid: { color: "#e3e6ea" } }
            }
          };
          if (chart) { chart.data = data; chart.options = opts; chart.update(); }
          else chart = new Chart(document.getElementById("rgChart"), { type: "scatter", data: data, options: opts, plugins: [whiteBg] });
        }
        inp.addEventListener("input", function () { render(parse(inp.value)); });
        ["rgTitle", "rgX", "rgY"].forEach(function (id) { document.getElementById(id).addEventListener("input", function () { render(lastPts); }); });
        if (window.DataInput) DataInput.mount(document.getElementById("rgFile"), { columns: [{ key: "x", label: "X 열 (가로축)" }, { key: "y", label: "Y 열 (세로축)" }], onData: function (rows) { render(rows); } });
        document.getElementById("rgDl").addEventListener("click", function () {
          if (!chart) return;
          var a = document.createElement("a");
          a.href = chart.toBase64Image("image/png", 1);
          a.download = (document.getElementById("rgTitle").value || "추세선") + ".png";
          a.click();
        });
      })();
    </script>
  </body>
</html>
